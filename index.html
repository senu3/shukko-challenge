<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>出庫チャレンジ - ペーパードライバー練習</title>
<style>
  :root{
    --asphalt-1:#2b2e33;
    --asphalt-2:#1c1e21;
    --line-white:#e8e6df;
    --signal-amber:#e8a33d;
    --signal-red:#c8453a;
    --signal-green:#4f9d6e;
    --panel-bg:#15171a;
    --panel-border:#3a3d42;
    --text-dim:#8b8f96;
    --text-bright:#e8e6df;
    --mono: "SF Mono","Consolas","DejaVu Sans Mono",monospace;
    --sans: "Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; background:var(--asphalt-2);
    font-family:var(--sans); color:var(--text-bright);
    touch-action:none; user-select:none; -webkit-user-select:none;
    position:fixed;
  }
  #gameCanvas{
    position:absolute; top:0; left:0; width:100%; height:100%; display:block;
    background:var(--asphalt-1);
  }

  /* ---------- Sensor setup / overlay screen ---------- */
  #startScreen{
    position:absolute; inset:0; z-index:50;
    background:var(--asphalt-2);
    display:flex; align-items:center; justify-content:center;
    padding:14px; overflow-y:auto; touch-action:pan-y;
  }
  #startScreen.hidden{ display:none; }
  .setup-shell{
    width:min(600px,100%); margin:auto;
  }
  .setup-card{
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:10px; padding:16px 18px; min-width:0;
  }
  .setup-brand{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .badge{
    flex:0 0 auto; font-family:var(--mono); font-size:10px; letter-spacing:0.12em;
    color:var(--signal-amber); border:1px solid var(--signal-amber);
    padding:3px 8px; border-radius:2px;
  }
  #startScreen h1{
    font-size:20px; margin:0; font-weight:700; letter-spacing:0.02em;
    text-wrap:balance;
  }
  .view-hidden{ display:none!important; }
  .setup-brief{ text-align:center; }
  #startScreen .sub{
    color:#b5b8bd; font-size:12px; line-height:1.6; margin:0 auto 8px;
    max-width:52ch; text-wrap:pretty;
  }
  .intro-title{ font-size:18px; margin:0 0 5px; text-wrap:balance; }
  .hold-guide{
    display:flex; align-items:center; justify-content:center; gap:14px;
    min-height:72px; margin:8px 0; color:var(--text-bright);
    font-size:12px; line-height:1.5; text-align:left;
  }
  .phone-demo-wrap{ width:100px; height:64px; flex:0 0 100px; display:grid; place-items:center; }
  #phoneDemo{
    width:82px; height:42px; border:2px solid #b7bbc1; border-radius:7px;
    position:relative; transform:rotate(0deg); transform-origin:center;
    transition:transform 0.18s cubic-bezier(.22,1,.36,1), border-color 0.18s ease;
  }
  #phoneDemo::before{
    content:""; position:absolute; inset:4px 9px; border:1px solid #555a61; border-radius:2px;
    background:#202328;
  }
  #phoneDemo::after{
    content:""; position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--signal-amber); right:3px; top:50%; transform:translateY(-50%);
  }
  .setup-note{
    margin:8px 0 10px; padding-top:8px; border-top:1px solid #34373c;
    color:#a9adb3; font-size:10px; line-height:1.5; text-align:center;
  }
  .diag-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px; }
  #setupStep{ font-family:var(--mono); font-size:10px; color:#b5b8bd; letter-spacing:0.06em; }
  #sensorState{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
    font-size:10px; color:#b5b8bd; white-space:nowrap;
  }
  #sensorState::before{
    content:""; width:8px; height:8px; border-radius:50%; background:#686d74;
    box-shadow:0 0 0 2px rgba(104,109,116,0.18);
  }
  #sensorState[data-state="working"]::before{ background:var(--signal-amber); box-shadow:0 0 0 2px rgba(232,163,61,0.2); }
  #sensorState[data-state="good"]::before{ background:var(--signal-green); box-shadow:0 0 0 2px rgba(79,157,110,0.22); }
  #sensorState[data-state="bad"]::before{ background:var(--signal-red); box-shadow:0 0 0 2px rgba(200,69,58,0.22); }
  .setup-progress{
    list-style:none; display:flex; gap:6px; margin:0 0 12px; padding:0;
  }
  .setup-progress li{
    flex:1; min-width:0; padding:6px 4px; border-bottom:3px solid #34383e;
    color:#8f949b; font:10px var(--mono); text-align:center;
  }
  .setup-progress li.current{ border-color:var(--signal-amber); color:#f0c273; }
  .setup-progress li.done{ border-color:var(--signal-green); color:#a9d5b9; }
  .diag-title{ font-size:18px; margin:0 0 4px; text-align:center; text-wrap:balance; }
  #setupInstruction{ margin:0 auto 5px; min-height:36px; max-width:52ch; color:#c5c8cc; font-size:12px; line-height:1.5; text-align:center; }
  .angle-readout{ display:flex; align-items:baseline; justify-content:center; gap:4px; margin:0 0 5px; }
  #angleValue{ font:700 28px/1 var(--mono); font-variant-numeric:tabular-nums; }
  .angle-unit{ color:#aeb2b8; font:11px var(--mono); }
  .angle-meter{ position:relative; height:34px; margin:0 6px 8px; }
  .angle-track{
    position:absolute; left:0; right:0; top:14px; height:4px; border-radius:4px; background:#34383e;
  }
  .angle-track::before{
    content:""; position:absolute; left:50%; top:-5px; width:2px; height:14px;
    transform:translateX(-50%); background:var(--line-white);
  }
  .angle-limit{ position:absolute; top:23px; color:#979ba2; font:9px var(--mono); }
  .angle-limit.left{ left:0; }
  .angle-limit.center{ left:50%; transform:translateX(-50%); }
  .angle-limit.right{ right:0; }
  #angleNeedle{
    position:absolute; top:6px; left:50%; width:4px; height:20px; border-radius:2px;
    background:var(--signal-amber); transform:translateX(-50%);
  }
  .stability-row{ display:flex; align-items:center; gap:9px; margin:0 0 10px; }
  .stability-label{ width:58px; color:#aeb2b8; font:10px var(--mono); }
  .stability-track{ flex:1; height:6px; background:#30343a; border-radius:5px; overflow:hidden; }
  #stabilityFill{ width:0; height:100%; background:var(--signal-amber); }
  #stabilityText{ width:70px; text-align:right; color:#bfc2c7; font:10px var(--mono); }
  .setup-actions{ display:flex; align-items:center; gap:8px; }
  #startBtn{
    flex:1;
    font-family:var(--sans); font-size:15px; font-weight:700; letter-spacing:0.04em;
    color:#1a1a1a; background:var(--signal-amber); border:none;
    min-height:46px; padding:11px 18px; border-radius:5px; cursor:pointer;
  }
  #startBtn:active{ filter:brightness(0.9); }
  #startBtn:disabled{ cursor:wait; color:#868a90; background:#34383e; }
  #keyboardBtn{
    display:none; min-height:46px; padding:9px 12px; border:1px solid #555a61;
    border-radius:5px; background:transparent; color:#d4d6d9; font:11px var(--sans); cursor:pointer;
  }
  #keyboardBtn.show{ display:block; }
  #modeNote{ margin:9px 0 0; font-size:10px; line-height:1.45; color:#b5b8bd; font-family:var(--mono); min-height:14px; }

  @media (max-height:430px) and (orientation:landscape){
    #startScreen{ align-items:flex-start; padding:4px 10px; }
    .setup-card{ padding:8px 12px; }
    .setup-brand{ margin-bottom:4px; }
    #startScreen h1{ font-size:19px; }
    #startScreen .sub{ margin-bottom:5px; line-height:1.45; }
    .intro-title{ font-size:16px; }
    .hold-guide{ min-height:44px; margin:2px 0; }
    .phone-demo-wrap{ height:42px; }
    #phoneDemo{ width:64px; height:33px; }
    .setup-note{ margin:4px 0 7px; padding-top:6px; }
    .diag-head{ margin-bottom:3px; }
    .setup-progress{ margin-bottom:5px; }
    .setup-progress li{ padding:3px 2px; }
    .diag-title{ font-size:15px; }
    #setupInstruction{ min-height:0; margin-bottom:2px; line-height:1.35; }
    .angle-readout{ margin-bottom:2px; }
    #angleValue{ font-size:24px; }
    .angle-meter{ height:30px; margin-bottom:2px; }
    .angle-limit{ top:20px; }
    .stability-row{ margin-bottom:5px; }
    #startBtn,#keyboardBtn{ min-height:44px; }
    #modeNote{ margin-top:5px; min-height:0; }
  }

  /* ---------- HUD ---------- */
  #hud{ position:absolute; inset:0; z-index:20; pointer-events:none; }
  #hud.hidden{ display:none; }

  .panel{
    pointer-events:auto;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:6px;
  }

  #topBar{
    position:absolute; top:max(8px, env(safe-area-inset-top));
    left:max(10px, env(safe-area-inset-left)); right:max(10px, env(safe-area-inset-right));
    display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
  }
  #statusPanel{
    padding:8px 12px; font-family:var(--mono); font-size:12px; color:var(--text-bright);
    display:flex; gap:14px;
  }
  #statusPanel .stat{ display:flex; flex-direction:column; gap:2px; }
  #statusPanel .stat .lbl{ font-size:9px; color:var(--text-dim); letter-spacing:0.1em; }
  #statusPanel .stat .val{ font-size:15px; }

  #recalBtn{
    border:1px solid var(--panel-border); background:var(--panel-bg); border-radius:6px;
    padding:10px 12px; font-family:var(--mono); font-size:11px; letter-spacing:0.05em;
    color:var(--text-bright); cursor:pointer; white-space:nowrap;
  }
  #recalBtn:active{ filter:brightness(1.4); }

  #wheelWrap{
    position:absolute; bottom:max(14px, env(safe-area-inset-bottom)); left:max(10px, env(safe-area-inset-left));
    width:70px; height:70px; pointer-events:none;
  }
  #wheelSvg{ width:100%; height:100%; transition:none; }

  #invertBtn{
    position:absolute; bottom:max(14px, env(safe-area-inset-bottom)); left:calc(max(10px, env(safe-area-inset-left)) + 78px);
    width:88px; padding:6px 4px; text-align:center;
    font-family:var(--mono); font-size:10px; color:#aeb2b8; cursor:pointer;
  }
  #invertBtn.active{ color:var(--signal-amber); border-color:var(--signal-amber); }

  #debugPanel{
    position:absolute; top:max(48px, calc(env(safe-area-inset-top) + 40px)); right:max(10px, env(safe-area-inset-right));
    padding:8px 10px; font-family:var(--mono); font-size:10px; color:var(--text-dim);
    line-height:1.6; min-width:120px;
  }
  #debugPanel.hidden{ display:none; }

  #brakeBtn{
    position:absolute; bottom:max(16px, env(safe-area-inset-bottom)); left:50%;
    transform:translateX(-50%);
    width:92px; height:92px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #d65a4f, var(--signal-red) 70%);
    border:3px solid #5a1f1a; color:#fff; font-weight:700; font-size:14px;
    display:flex; align-items:center; justify-content:center; letter-spacing:0.05em;
    box-shadow:0 4px 0 #5a1f1a, 0 6px 10px rgba(0,0,0,0.4);
    pointer-events:auto;
  }
  #brakeBtn.pressed{ box-shadow:0 1px 0 #5a1f1a; transform:translateX(-50%) translateY(3px); filter:brightness(1.15); }

  #gearBtn{
    position:absolute; bottom:max(12px, env(safe-area-inset-bottom)); right:max(12px, env(safe-area-inset-right));
    width:74px; height:106px; border-radius:10px; padding:0;
    background:#111316; border:2px solid #4a4e55; color:var(--text-bright);
    font-family:var(--mono); pointer-events:auto; cursor:pointer;
  }
  #gearBtn.locked{ opacity:0.45; }
  .gear-label{
    position:absolute; right:10px; font-size:12px; font-weight:700; color:#858a91;
  }
  .gear-label.d{ top:14px; }
  .gear-label.r{ bottom:14px; }
  .gear-slot{
    position:absolute; left:18px; top:17px; width:8px; height:72px; border-radius:5px;
    background:#050607; box-shadow:inset 0 0 0 1px #30343a;
  }
  .gear-stick{
    position:absolute; left:19px; top:25px; width:6px; height:55px;
    border-radius:4px; background:#747981;
  }
  .gear-knob{
    position:absolute; left:10px; top:14px; width:24px; height:24px; border-radius:50%;
    background:var(--signal-amber); border:3px solid #4f3512;
    transform:translateY(52px); transition:transform 0.18s cubic-bezier(.22,1,.36,1);
  }
  #gearBtn[data-gear="D"] .gear-knob{ transform:translateY(0); }
  #gearBtn[data-gear="D"] .gear-label.d,
  #gearBtn[data-gear="R"] .gear-label.r{ color:var(--signal-amber); }

  #accelHint{
    position:absolute; top:max(8px, env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%); font-size:10px; color:var(--text-dim);
    font-family:var(--mono); letter-spacing:0.05em; pointer-events:none;
    text-align:center; width:200px;
  }
  #accelHint.hidden{ display:none; }

  #lessonPanel{
    position:absolute; top:max(8px, env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%); width:min(300px, calc(100vw - 220px));
    min-width:238px; padding:7px 10px 8px; border-color:#625033;
    pointer-events:none;
  }
  #lessonPanel.hidden{ display:none; }
  .lesson-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  #lessonCount{ color:var(--signal-amber); font:700 10px var(--mono); letter-spacing:0.06em; }
  .lesson-progress{ display:flex; gap:4px; width:74px; }
  .lesson-progress span{ flex:1; height:3px; border-radius:3px; background:#464a50; }
  .lesson-progress span.done{ background:var(--signal-green); }
  .lesson-progress span.current{ background:var(--signal-amber); }
  #lessonTitle{ display:block; margin:3px 0 1px; font-size:14px; line-height:1.25; }
  #lessonInstruction{ margin:0; color:#c4c7cb; font-size:11px; line-height:1.35; }

  #lessonNextBtn{
    position:absolute; top:57%; left:50%; transform:translate(-50%,0);
    min-width:144px; min-height:44px; padding:10px 20px; border:1px solid #654a20;
    border-radius:5px; background:var(--signal-amber); color:#1a1a1a;
    font:700 13px var(--sans); opacity:0; pointer-events:none;
    transition:opacity 0.15s ease;
  }
  #lessonNextBtn.show{ opacity:1; pointer-events:auto; }

  #toast{
    position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
    padding:14px 28px; border-radius:6px; font-size:18px; font-weight:700;
    letter-spacing:0.04em; text-align:center; pointer-events:none;
    opacity:0; transition:opacity 0.15s ease;
    background:var(--panel-bg); border:1px solid var(--panel-border);
  }
  #toast.show{ opacity:1; }
  #toast.bad{ color:var(--signal-red); border-color:var(--signal-red); }
  #toast.good{ color:var(--signal-green); border-color:var(--signal-green); }

  #retryBtn{
    position:absolute; top:54%; left:50%; transform:translate(-50%,0);
    padding:10px 26px; border-radius:5px; font-size:13px; font-weight:700;
    background:var(--signal-amber); color:#1a1a1a; border:none;
    opacity:0; pointer-events:none; transition:opacity 0.15s ease;
  }
  #retryBtn.show{ opacity:1; pointer-events:auto; }

  /* ---------- Rotate-device prompt (landscape is the only supported play orientation) ---------- */
  #rotatePrompt{
    position:absolute; inset:0; z-index:100;
    display:none;
    background:var(--asphalt-2);
    flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px;
  }
  @media (orientation: portrait){
    #rotatePrompt{ display:flex; }
  }
  #rotatePrompt svg{ width:64px; height:64px; margin-bottom:18px; }
  #rotatePrompt h2{ font-size:18px; margin:0 0 8px; }
  #rotatePrompt p{ font-size:13px; color:var(--text-dim); margin:0; max-width:260px; }

  button:focus-visible{ outline:3px solid var(--line-white); outline-offset:3px; }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{ scroll-behavior:auto!important; transition-duration:0.01ms!important; animation-duration:0.01ms!important; }
  }
  @media (max-width:720px){
    #lessonPanel{ width:240px; min-width:0; }
    #lessonInstruction{ font-size:10px; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="rotatePrompt">
  <svg viewBox="0 0 24 24" fill="none" stroke="#e8a33d" stroke-width="1.6">
    <rect x="7" y="2" width="10" height="16" rx="1.6" transform="rotate(90 12 10)"/>
    <path d="M19 7c1 1.6 1 4.4 0 6M19 13l1.4 1.4M19 13l-1.7 0.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h2>スマホを横向きに</h2>
  <p>横画面でプレイします。</p>
</div>

<div id="hud" class="hidden">
  <div id="topBar">
    <div id="statusPanel" class="panel">
      <div class="stat"><span class="lbl">SPEED</span><span class="val" id="speedVal">0 km/h</span></div>
      <div class="stat"><span class="lbl">GEAR</span><span class="val" id="gearVal">D 前進</span></div>
    </div>
    <button id="recalBtn" type="button">⟳ 再キャリブレーション</button>
  </div>

  <div id="wheelWrap">
    <svg id="wheelSvg" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="none" stroke="#3a3d42" stroke-width="6"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="#8b8f96" stroke-width="2"/>
      <g id="wheelRotor">
        <line x1="50" y1="14" x2="50" y2="86" stroke="#e8a33d" stroke-width="4" stroke-linecap="round"/>
        <line x1="14" y1="50" x2="86" y2="50" stroke="#8b8f96" stroke-width="4" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="6" fill="#e8a33d"/>
      </g>
    </svg>
  </div>
  <button id="invertBtn" type="button" class="panel" aria-pressed="false">操舵反転: OFF</button>

  <div id="debugPanel" class="panel hidden"></div>

  <div id="accelHint">D 前進｜長押しで進む</div>
  <section id="lessonPanel" class="panel hidden" aria-live="polite">
    <div class="lesson-head">
      <span id="lessonCount">ミニ教習 1/3</span>
      <span class="lesson-progress" aria-hidden="true"><span></span><span></span><span></span></span>
    </div>
    <strong id="lessonTitle">前進と停止</strong>
    <p id="lessonInstruction">長押しで前進</p>
  </section>
  <button id="brakeBtn" type="button" class="panel">BRAKE</button>
  <button id="gearBtn" type="button" data-gear="D" aria-disabled="false" aria-label="シフト D 前進。タップしてR 後退へ切り替え">
    <span class="gear-slot" aria-hidden="true"></span>
    <span class="gear-stick" aria-hidden="true"></span>
    <span class="gear-knob" aria-hidden="true"></span>
    <span class="gear-label d" aria-hidden="true">D</span>
    <span class="gear-label r" aria-hidden="true">R</span>
  </button>

  <div id="toast"></div>
  <button id="lessonNextBtn" type="button" hidden>次の教習</button>
  <button id="retryBtn">もう一度</button>
</div>

<div id="startScreen" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
  <div class="setup-shell">
    <section class="setup-card">
      <header class="setup-brand">
        <div class="badge">PAPER DRIVER TRAINING</div>
        <h1 id="setupTitle">出庫チャレンジ</h1>
      </header>

      <div id="introView" class="setup-brief">
        <p class="sub">スマホを回して、駐車スペースから出よう。</p>
        <h2 class="intro-title">まずはセンサー確認</h2>
      </div>

      <div id="diagnosticView" class="view-hidden" aria-labelledby="setupPanelTitle">
        <div class="diag-head">
          <span id="setupStep">センサー準備</span>
          <span id="sensorState" data-state="idle"><span id="sensorStateText">未確認</span></span>
        </div>
        <ol id="setupProgress" class="setup-progress" aria-label="センサー確認の進行状況">
          <li data-progress="center">1 正面</li>
          <li data-progress="right">2 右へ</li>
          <li data-progress="left">3 左へ</li>
          <li data-progress="ready">4 完了</li>
        </ol>
        <h2 id="setupPanelTitle" class="diag-title">センサーを準備しています</h2>
        <p id="setupInstruction">画面の案内に沿って進めてください。</p>
      </div>

      <div class="hold-guide">
        <div class="phone-demo-wrap" aria-hidden="true"><div id="phoneDemo"></div></div>
        <div id="holdHint">横向きで両手に持つ</div>
      </div>

      <div id="diagnosticData" class="view-hidden">
        <div class="angle-readout" aria-label="現在の操舵角">
          <span id="angleValue">--</span><span class="angle-unit">deg</span>
        </div>
        <div class="angle-meter" aria-hidden="true">
          <div class="angle-track"></div>
          <span class="angle-limit left">-60</span>
          <span class="angle-limit center">0</span>
          <span class="angle-limit right">+60</span>
          <span id="angleNeedle"></span>
        </div>
        <div class="stability-row">
          <span class="stability-label">STABILITY</span>
          <div class="stability-track"><div id="stabilityFill"></div></div>
          <span id="stabilityText">待機中</span>
        </div>
      </div>

      <p id="setupNote" class="setup-note">長押し：アクセル　BRAKE：停止　D/R：切替</p>

      <div class="setup-actions">
        <button id="startBtn" type="button">確認する</button>
        <button id="keyboardBtn" type="button">PCキーで開始</button>
      </div>
      <div id="modeNote" role="status" aria-live="polite"></div>
    </section>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* =========================================================
     CONFIG - 調整用パラメータ。実機テストで合わなければここを調整。
  ========================================================== */
  const CONFIG = {
    pxPerMeter: 23,            // 画面スケール(横画面の低い縦幅でも前後の見通しを確保するため少し控えめに)
    carLength: 4.0,            // 車全長(m)
    carWidth: 1.75,            // 車全幅(m)
    wheelBase: 2.55,           // ホイールベース(m) - 旋回半径に直結
    maxSteerDeg: 33,           // 前輪の最大切れ角(度)
    steerInputMaxDeg: 60,      // スマホをこの角度まで回すと最大切れ角になる
    steerSmoothing: 0.22,      // ステアリング入力の平滑化係数(0-1, 大きいほど追従が速い)
    maxSpeedFwd: 4.0,          // 前進最高速度(m/s) ≒14.4km/h
    maxSpeedRev: 2.6,          // 後退最高速度(m/s)
    accel: 2.0,                // アクセル加速度(m/s^2)
    coastDecel: 1.1,           // 自然減速(エンジンブレーキ相当)
    brakeDecel: 4.2,           // ブレーキ減速度
    gearSwitchMaxSpeed: 0.25,  // ギア切替を許す最大速度(m/s)
  };

  const SENSOR_CONFIG = {
    minSamples: 28,            // 中立位置の判定に使う連続サンプル数
    maxDeviationDeg: 2.6,      // サンプル群の最大ばらつき。この範囲なら静止とみなす
    minPlaneGravity: 3.5,      // 画面を寝かせすぎていないかを判定する重力成分(m/s^2)
    testThresholdDeg: 18,      // 左右入力テストの合格角度
    sensorTimeoutMs: 6000,     // センサー値が届かない場合の待ち時間
  };

  /* =========================================================
     SCENES - ワールド座標(メートル, 画面下が+y)
  ========================================================== */
  const STAGE = {
    // 駐車スロット: 車の初期位置の左右に壁(隣の車を表す)
    walls: [
      { x:-5.6, y:-1.0, w:3.6, h:10.0 },  // 左側の隣接車両ブロック
      { x: 2.0, y:-1.0, w:3.6, h:10.0 },  // 右側の隣接車両ブロック
    ],
    startPos: { x:0, y:2.0, heading:0 }, // フロントを画面上へ向け、Dで通路へ出る。
    startGear: 1,
    goal: { x:-3.2, y:-8.0, w:8.4, h:4.0 },
    goalHeadingTargetDeg: 0,
    worldBounds: { x:-9, y:-14, w:18, h:20 },
  };

  const LESSONS = [
    {
      id:"stop", title:"前進して止まる", startPos:{x:0,y:2.5,heading:0}, startGear:1,
      goal:{x:-1.5,y:-3.2,w:3,h:3.0}, goalLabel:"STOP", fixedGear:true,
    },
    {
      id:"forwardTurn", title:"前進で右へ曲がる", startPos:{x:0,y:2.5,heading:0}, startGear:1,
      goal:{x:1.8,y:-2.7,w:3.2,h:3.2}, goalLabel:"右へ", fixedGear:true,
    },
    {
      id:"reverseTurn", title:"バックで右へ曲がる", startPos:{x:0,y:-2.0,heading:0}, startGear:1,
      goal:{x:1.8,y:1.5,w:3.2,h:3.2}, goalLabel:"後ろへ", fixedGear:false,
    },
  ];

  /* =========================================================
     STATE
  ========================================================== */
  let canvas, ctx;
  let dpr = Math.min(window.devicePixelRatio||1, 2);
  let camScale = CONFIG.pxPerMeter;

  let useMotion = false;
  let rawAngleDeg = null;
  let baselineAngleDeg = 0;
  let smoothedSteerDeg = 0;
  let invertSteer = false;
  let motionListenerAttached = false;
  let sensorEventSeen = false;
  let sensorPostureOk = false;
  let sensorPlaneGravity = 0;
  let setupState = "intro"; // intro | requesting | calibrating | testingRight | testingLeft | returnCenter | ready | fallback
  let setupResumeGame = false;
  let calibrationSamples = [];
  let calibrationTimer = null;
  let sensorDirectionSign = 1; // 実機で「右へ回す」方向を正として自動設定

  let keyLeft=false, keyRight=false, keyAccel=false, keyBrake=false;
  let pointerAccelCount = 0; // active accelerator touches on background

  let car = null;
  let gameState = "playing"; // playing | lessonComplete | crashed | cleared
  let activityMode = "challenge"; // lesson | challenge
  let lessonIndex = 0;
  let lessonSteerPeak = 0;
  let lessonGearChanged = false;
  let trainingStarted = false;
  let debugVisible = false;
  let lastTime = null;

  function resetCar(){
    const scene=activityMode==="lesson"?LESSONS[lessonIndex]:STAGE;
    car = {
      x: scene.startPos.x,
      y: scene.startPos.y,
      heading: scene.startPos.heading,
      speed: 0,
      steerAngle: 0, // 実際の前輪角(ラジアン, 平滑化後の物理量)
      gear: scene.startGear,
    };
    lessonSteerPeak=0;
    lessonGearChanged=false;
    smoothedSteerDeg=0;
    gameState = "playing";
    hideToast();
    const lessonNext=document.getElementById("lessonNextBtn");
    if(lessonNext){ lessonNext.hidden=true; lessonNext.classList.remove("show"); }
    document.getElementById("retryBtn")?.classList.remove("show");
    if(document.getElementById("gearBtn")) syncGearUI();
  }

  /* =========================================================
     CANVAS SETUP
  ========================================================== */
  function setupCanvas(){
    canvas = document.getElementById("gameCanvas");
    ctx = canvas.getContext("2d");
    resize();
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", ()=> setTimeout(resize, 120));
  }
  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio||1, 2);
    canvas.width = w*dpr; canvas.height = h*dpr;
    canvas.style.width = w+"px"; canvas.style.height = h+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  /* =========================================================
     SENSOR HANDLING (devicemotion - gravity vector roll angle)
  ========================================================== */
  function onMotion(e){
    const acc = e.accelerationIncludingGravity;
    if(!acc || !Number.isFinite(acc.x) || !Number.isFinite(acc.y)) return;
    sensorEventSeen = true;
    sensorPlaneGravity = Math.hypot(acc.x, acc.y);
    sensorPostureOk = sensorPlaneGravity >= SENSOR_CONFIG.minPlaneGravity;

    if(!sensorPostureOk){
      if(setupState === "calibrating") calibrationSamples = [];
      renderSetupDiagnostics();
      return;
    }

    // 画面平面内での重力ベクトルの向き = スマホの回転(ロール)角
    rawAngleDeg = Math.atan2(acc.x, acc.y) * 180/Math.PI;

    if(setupState === "calibrating") collectCalibrationSample(rawAngleDeg);
    if(setupState === "testingRight" || setupState === "testingLeft" || setupState === "returnCenter") updateGuidedSensorTest();
    renderSetupDiagnostics();
  }

  function angleDiff(a,b){
    let d = a-b;
    while(d>180) d-=360;
    while(d<-180) d+=360;
    return d;
  }

  function circularMeanDeg(values){
    let sx=0, sy=0;
    for(const value of values){
      const rad=value*Math.PI/180;
      sx+=Math.sin(rad); sy+=Math.cos(rad);
    }
    return Math.atan2(sx/values.length, sy/values.length)*180/Math.PI;
  }

  function collectCalibrationSample(angle){
    calibrationSamples.push(angle);
    if(calibrationSamples.length > SENSOR_CONFIG.minSamples){
      calibrationSamples.shift();
    }
    if(calibrationSamples.length < SENSOR_CONFIG.minSamples) return;

    const mean = circularMeanDeg(calibrationSamples);
    const maxDeviation = Math.max(...calibrationSamples.map(value=>Math.abs(angleDiff(value,mean))));
    if(maxDeviation > SENSOR_CONFIG.maxDeviationDeg) return;

    baselineAngleDeg = mean;
    smoothedSteerDeg = 0;
    clearCalibrationTimer();
    setSetupState("testingRight");
  }

  function updateGuidedSensorTest(){
    if(rawAngleDeg===null) return;
    const rawRelative = angleDiff(rawAngleDeg, baselineAngleDeg);
    if(setupState === "testingRight" && Math.abs(rawRelative) >= SENSOR_CONFIG.testThresholdDeg){
      sensorDirectionSign = rawRelative>=0 ? 1 : -1;
      setSetupState("testingLeft");
      return;
    }
    const relative = rawRelative*sensorDirectionSign;
    if(setupState === "testingLeft" && relative <= -SENSOR_CONFIG.testThresholdDeg){
      setSetupState("returnCenter");
    }else if(setupState === "returnCenter" && Math.abs(relative) <= 8){
      setSetupState("ready");
    }
  }

  function clearCalibrationTimer(){
    if(calibrationTimer){ clearTimeout(calibrationTimer); calibrationTimer=null; }
  }

  function attachMotionListener(){
    if(motionListenerAttached) return;
    window.addEventListener("devicemotion", onMotion);
    motionListenerAttached = true;
  }

  function beginCalibration(returnToGame){
    setupResumeGame = !!returnToGame;
    calibrationSamples = [];
    sensorEventSeen = false;
    sensorDirectionSign = 1;
    rawAngleDeg = null;
    sensorPostureOk = false;
    document.getElementById("startScreen").classList.remove("hidden");
    document.getElementById("startScreen").setAttribute("aria-hidden","false");
    document.getElementById("startScreen").scrollTop=0;
    document.getElementById("hud").classList.add("hidden");
    setSetupState("calibrating");
    clearCalibrationTimer();
    calibrationTimer=setTimeout(()=>{
      if(setupState === "calibrating"){
        useMotion=false;
        const detail=sensorEventSeen
          ? "正面で静止できませんでした。スマホを立てて再確認してください。"
          : "センサーを受信できません。HTTPSとブラウザ設定を確認してください。";
        setSetupState("fallback", detail);
      }
    }, SENSOR_CONFIG.sensorTimeoutMs);
  }

  function renderSetupDiagnostics(){
    const angleValue=document.getElementById("angleValue");
    const needle=document.getElementById("angleNeedle");
    const phone=document.getElementById("phoneDemo");
    const fill=document.getElementById("stabilityFill");
    const stabilityText=document.getElementById("stabilityText");
    if(!angleValue || !needle || !phone) return;

    let relative=null;
    if(rawAngleDeg!==null){
      if(setupState === "calibrating" && calibrationSamples.length){
        relative=angleDiff(rawAngleDeg, calibrationSamples[0]);
      }else if(setupState === "testingRight"){
        relative=Math.abs(angleDiff(rawAngleDeg, baselineAngleDeg));
      }else if(setupState === "testingLeft" || setupState === "returnCenter" || setupState === "ready"){
        relative=angleDiff(rawAngleDeg, baselineAngleDeg)*sensorDirectionSign;
      }
    }
    const displayAngle=relative===null?0:Math.max(-60,Math.min(60,relative));
    angleValue.textContent=relative===null?"--":`${relative>=0?"+":""}${Math.round(relative)}`;
    needle.style.left=`${((displayAngle+60)/120)*100}%`;
    phone.style.transform=`rotate(${Math.max(-42,Math.min(42,displayAngle))}deg)`;

    if(setupState === "calibrating"){
      fill.style.background="var(--signal-amber)";
      if(!sensorPostureOk){
        fill.style.width="0%";
        stabilityText.textContent=sensorPlaneGravity>0?"端末を立てる":"受信待ち";
      }else{
        const sampleRatio=Math.min(1,calibrationSamples.length/SENSOR_CONFIG.minSamples);
        let quality=1;
        if(calibrationSamples.length>2){
          const mean=circularMeanDeg(calibrationSamples);
          const deviation=Math.max(...calibrationSamples.map(value=>Math.abs(angleDiff(value,mean))));
          quality=Math.max(0.08,Math.min(1,SENSOR_CONFIG.maxDeviationDeg/Math.max(deviation,0.1)));
        }
        fill.style.width=`${Math.round(sampleRatio*quality*100)}%`;
        stabilityText.textContent=quality<0.7?"静止する":`${calibrationSamples.length}/${SENSOR_CONFIG.minSamples}`;
      }
    }else if(setupState === "testingRight" || setupState === "testingLeft" || setupState === "returnCenter" || setupState === "ready"){
      fill.style.width="100%";
      fill.style.background="var(--signal-green)";
      stabilityText.textContent="固定済み";
    }else{
      fill.style.width="0%";
      fill.style.background="var(--signal-amber)";
      stabilityText.textContent="待機中";
    }

  }

  function updateSetupProgress(state){
    const items=[...document.querySelectorAll("#setupProgress li")];
    const activeByState={requesting:0,calibrating:0,testingRight:1,testingLeft:2,returnCenter:3};
    const doneByState={requesting:0,calibrating:0,testingRight:1,testingLeft:2,returnCenter:3,ready:4};
    const active=activeByState[state];
    const done=doneByState[state]||0;
    items.forEach((item,index)=>{
      const isDone=index<done || state==="ready";
      const isCurrent=state!=="ready" && index===active;
      item.classList.toggle("done",isDone);
      item.classList.toggle("current",isCurrent);
      if(isCurrent) item.setAttribute("aria-current","step"); else item.removeAttribute("aria-current");
      item.setAttribute("aria-label",`${item.textContent}${isDone?" 完了":isCurrent?" 現在":""}`);
    });
  }

  function setSetupState(state, detail){
    setupState=state;
    const step=document.getElementById("setupStep");
    const sensor=document.getElementById("sensorState");
    const sensorText=document.getElementById("sensorStateText");
    const title=document.getElementById("setupPanelTitle");
    const instruction=document.getElementById("setupInstruction");
    const primary=document.getElementById("startBtn");
    const keyboard=document.getElementById("keyboardBtn");
    const note=document.getElementById("modeNote");
    const intro=document.getElementById("introView");
    const diagnostic=document.getElementById("diagnosticView");
    const diagnosticData=document.getElementById("diagnosticData");
    const setupNote=document.getElementById("setupNote");
    const holdHint=document.getElementById("holdHint");
    if(!primary) return;
    primary.disabled=false;
    primary.classList.remove("view-hidden");
    keyboard.classList.remove("show");
    note.textContent="";
    note.classList.toggle("view-hidden",!(state==="ready" || state==="fallback"));
    const isIntro=state==="intro";
    intro.classList.toggle("view-hidden",!isIntro);
    diagnostic.classList.toggle("view-hidden",isIntro);
    diagnosticData.classList.toggle("view-hidden",isIntro || state==="fallback");
    setupNote.classList.toggle("view-hidden",!isIntro);
    holdHint.classList.toggle("view-hidden",!isIntro);
    updateSetupProgress(state);

    if(state==="intro"){
      holdHint.textContent="横向きで両手に持つ";
      primary.textContent="確認する"; primary.dataset.action="request";
    }else if(state==="requesting"){
      step.textContent="センサー準備"; sensor.dataset.state="working"; sensorText.textContent="許可を確認中";
      title.textContent="センサーを許可";
      instruction.textContent="確認が出たら「許可」";
      primary.textContent="確認中…"; primary.disabled=true; primary.classList.add("view-hidden");
    }else if(state==="calibrating"){
      step.textContent="準備 1/4"; sensor.dataset.state="working"; sensorText.textContent="正面を測定中";
      title.textContent="正面で止める";
      instruction.textContent="動かさずキープ";
      primary.textContent="静止してお待ちください"; primary.disabled=true; primary.classList.add("view-hidden");
    }else if(state==="testingRight"){
      step.textContent="準備 2/4"; sensor.dataset.state="working"; sensorText.textContent="右入力を確認";
      title.textContent="右へ回す";
      instruction.textContent="20°まで";
      primary.textContent="右へ傾けてください"; primary.disabled=true; primary.classList.add("view-hidden");
    }else if(state==="testingLeft"){
      step.textContent="準備 3/4"; sensor.dataset.state="working"; sensorText.textContent="左入力を確認";
      title.textContent="左へ回す";
      instruction.textContent="20°まで";
      primary.textContent="左へ傾けてください"; primary.disabled=true; primary.classList.add("view-hidden");
    }else if(state==="returnCenter"){
      step.textContent="準備 4/4"; sensor.dataset.state="working"; sensorText.textContent="中立へ戻す";
      title.textContent="正面へ戻す";
      instruction.textContent="0°で完了";
      primary.textContent="正面へ戻してください"; primary.disabled=true; primary.classList.add("view-hidden");
    }else if(state==="ready"){
      step.textContent="確認完了"; sensor.dataset.state="good"; sensorText.textContent="入力 正常";
      title.textContent="準備OK";
      instruction.textContent="そのままスタート";
      primary.textContent=setupResumeGame?"走行に戻る":"ミニ教習へ"; primary.dataset.action="start";
      note.textContent="右上で再調整";
    }else if(state==="fallback"){
      step.textContent="センサー確認"; sensor.dataset.state="bad"; sensorText.textContent="利用できません";
      title.textContent="センサーを使えません";
      instruction.textContent=detail||"ブラウザ設定でセンサーを許可してください。";
      primary.textContent="再確認"; primary.dataset.action="request";
      keyboard.classList.add("show");
      note.textContent="PCのみ矢印キーで確認できます。";
    }
    renderSetupDiagnostics();
  }

  async function requestMotionPermission(){
    if(typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function"){
      try{
        const res = await DeviceMotionEvent.requestPermission();
        return res === "granted";
      }catch(err){
        return false;
      }
    }
    // Android等、許可APIが無い場合はそのまま使える(HTTPS前提)
    return (typeof DeviceMotionEvent !== "undefined");
  }

  /* =========================================================
     INPUT - keyboard fallback (PC確認用)
  ========================================================== */
  window.addEventListener("keydown", (e)=>{
    if(e.code==="ArrowLeft") keyLeft=true;
    if(e.code==="ArrowRight") keyRight=true;
    if(e.code==="ArrowUp"||e.code==="Space") keyAccel=true;
    if(e.code==="ArrowDown") keyBrake=true;
  });
  window.addEventListener("keyup", (e)=>{
    if(e.code==="ArrowLeft") keyLeft=false;
    if(e.code==="ArrowRight") keyRight=false;
    if(e.code==="ArrowUp"||e.code==="Space") keyAccel=false;
    if(e.code==="ArrowDown") keyBrake=false;
  });

  /* =========================================================
     INPUT - pointer (touch/mouse unified)
  ========================================================== */
  function setupPointerInputs(){
    const cv = canvas;
    cv.addEventListener("pointerdown", (e)=>{ pointerAccelCount++; cv.setPointerCapture && safeCapture(cv,e.pointerId); });
    cv.addEventListener("pointerup", (e)=>{ pointerAccelCount = Math.max(0,pointerAccelCount-1); });
    cv.addEventListener("pointercancel", (e)=>{ pointerAccelCount = Math.max(0,pointerAccelCount-1); });
    cv.addEventListener("pointerleave", (e)=>{ /* keep counting; capture handles drag-off */ });

    const brake = document.getElementById("brakeBtn");
    brake.addEventListener("pointerdown", (e)=>{ e.stopPropagation(); keyBrakeBtn=true; brake.classList.add("pressed"); });
    brake.addEventListener("pointerup", (e)=>{ e.stopPropagation(); keyBrakeBtn=false; brake.classList.remove("pressed"); });
    brake.addEventListener("pointercancel", (e)=>{ keyBrakeBtn=false; brake.classList.remove("pressed"); });
    brake.addEventListener("pointerleave", (e)=>{ keyBrakeBtn=false; brake.classList.remove("pressed"); });

    const gearBtn = document.getElementById("gearBtn");
    gearBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      if(!car) return;
      const lesson=activityMode==="lesson"?LESSONS[lessonIndex]:null;
      if(lesson?.fixedGear){
        flashToast("この教習はDのまま", "bad", 700);
        return;
      }
      if(Math.abs(car.speed) > CONFIG.gearSwitchMaxSpeed){
        flashToast("停止して切替", "bad", 800);
        return;
      }
      car.gear *= -1;
      if(activityMode==="lesson") lessonGearChanged=true;
      syncGearUI();
    });

    document.getElementById("recalBtn").addEventListener("click", (e)=>{
      e.stopPropagation();
      if(useMotion && motionListenerAttached){
        car.speed=0;
        beginCalibration(true);
      }else{
        flashToast("センサー未使用", "bad", 1000);
      }
    });
    const invBtn = document.getElementById("invertBtn");
    invBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      invertSteer = !invertSteer;
      invBtn.textContent = "操舵反転: " + (invertSteer?"ON":"OFF");
      invBtn.classList.toggle("active", invertSteer);
      invBtn.setAttribute("aria-pressed", String(invertSteer));
    });

    document.getElementById("retryBtn").addEventListener("click", (e)=>{
      e.stopPropagation();
      resetCar();
      document.getElementById("retryBtn").classList.remove("show");
    });

    document.getElementById("lessonNextBtn").addEventListener("click", (e)=>{
      e.stopPropagation();
      if(gameState!=="lessonComplete") return;
      if(lessonIndex<LESSONS.length-1) startLesson(lessonIndex+1);
      else startChallenge();
    });

    window.addEventListener("blur", resetPressedInputs);
    document.addEventListener("visibilitychange", ()=>{ if(document.hidden) resetPressedInputs(); });
  }
  function safeCapture(el,id){ try{ el.setPointerCapture(id); }catch(e){} }
  let keyBrakeBtn = false;

  function resetPressedInputs(){
    pointerAccelCount=0;
    keyAccel=false; keyBrake=false; keyBrakeBtn=false;
    document.getElementById("brakeBtn").classList.remove("pressed");
  }

  function syncGearUI(){
    if(!car) return;
    const gear=car.gear>0?"D":"R";
    const direction=car.gear>0?"前進":"後退";
    const gearBtn=document.getElementById("gearBtn");
    document.getElementById("gearVal").textContent=`${gear} ${direction}`;
    document.getElementById("accelHint").textContent=`${gear} ${direction}｜長押しで進む`;
    gearBtn.dataset.gear=gear;
    gearBtn.setAttribute("aria-label",`シフト ${gear} ${direction}。タップして${gear==="D"?"R 後退":"D 前進"}へ切り替え`);
  }

  /* =========================================================
     MINI LESSONS
  ========================================================== */
  function startLesson(index){
    activityMode="lesson";
    lessonIndex=Math.max(0,Math.min(LESSONS.length-1,index));
    trainingStarted=true;
    document.getElementById("lessonPanel").classList.remove("hidden");
    document.getElementById("accelHint").classList.add("hidden");
    resetCar();
    updateLessonPanel();
  }

  function startChallenge(){
    activityMode="challenge";
    trainingStarted=true;
    document.getElementById("lessonPanel").classList.add("hidden");
    document.getElementById("accelHint").classList.remove("hidden");
    resetCar();
    flashToast("出庫チャレンジ", "good", 900);
  }

  function updateLessonPanel(){
    if(activityMode!=="lesson") return;
    const lesson=LESSONS[lessonIndex];
    document.getElementById("lessonCount").textContent=`ミニ教習 ${lessonIndex+1}/${LESSONS.length}`;
    document.getElementById("lessonTitle").textContent=lesson.title;
    let instruction="";
    if(lesson.id==="stop"){
      instruction=car.y<=lesson.goal.y+lesson.goal.h?"BRAKEで止まる":"長押しでSTOPへ";
    }else if(lesson.id==="forwardTurn"){
      instruction=lessonSteerPeak<12?"スマホを右へ回す":"そのまま長押し";
    }else{
      instruction=car.gear>0?"シフトをRへ":lessonSteerPeak<12?"スマホを右へ回す":"長押しでバック";
    }
    document.getElementById("lessonInstruction").textContent=instruction;
    document.querySelectorAll(".lesson-progress span").forEach((item,index)=>{
      item.classList.toggle("done",index<lessonIndex || gameState==="lessonComplete" && index===lessonIndex);
      item.classList.toggle("current",index===lessonIndex && gameState!=="lessonComplete");
    });
  }

  function pointInRect(x,y,rect){
    return x>rect.x && x<rect.x+rect.w && y>rect.y && y<rect.y+rect.h;
  }

  function checkLessonGoal(){
    const lesson=LESSONS[lessonIndex];
    if(lesson.id==="stop") return car.y<=lesson.goal.y+lesson.goal.h && Math.abs(car.speed)<0.25;
    if(lesson.id==="forwardTurn") return car.x>=lesson.goal.x && car.y<=lesson.goal.y+lesson.goal.h && lessonSteerPeak>=10;
    return car.x>=lesson.goal.x && car.y>=lesson.goal.y && car.gear<0 && lessonGearChanged && lessonSteerPeak>=10;
  }

  function completeLesson(){
    car.speed=0;
    gameState="lessonComplete";
    resetPressedInputs();
    updateLessonPanel();
    flashToast(lessonIndex===LESSONS.length-1?"3つクリア！":"できました！", "good", 99999);
    const next=document.getElementById("lessonNextBtn");
    next.textContent=lessonIndex===LESSONS.length-1?"出庫に挑戦":"次の教習";
    next.hidden=false;
    next.classList.add("show");
  }

  /* =========================================================
     PHYSICS UPDATE
  ========================================================== */
  function updateSteeringInput(dt){
    let targetDeg = 0;
    if(useMotion && rawAngleDeg!==null){
      let rel = angleDiff(rawAngleDeg, baselineAngleDeg)*sensorDirectionSign;
      if(invertSteer) rel = -rel;
      targetDeg = Math.max(-CONFIG.steerInputMaxDeg, Math.min(CONFIG.steerInputMaxDeg, rel));
    } else {
      // keyboard fallback
      let dir = (keyRight?1:0) - (keyLeft?1:0);
      if(invertSteer) dir = -dir;
      targetDeg = dir * CONFIG.steerInputMaxDeg;
    }
    const k = CONFIG.steerSmoothing;
    smoothedSteerDeg += (targetDeg - smoothedSteerDeg) * Math.min(1, k + dt*2);
  }

  function rectCorners(cx,cy,w,h,heading){
    const hw=w/2, hh=h/2;
    const c=Math.cos(heading), s=Math.sin(heading);
    const local=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
    return local.map(([lx,ly])=>({ x: cx + lx*c - ly*s, y: cy + lx*s + ly*c }));
  }

  // SAT collision between two convex polygons (arrays of {x,y})
  function polygonsIntersect(polyA, polyB){
    const polys=[polyA,polyB];
    for(const poly of polys){
      for(let i=0;i<poly.length;i++){
        const p1=poly[i], p2=poly[(i+1)%poly.length];
        const nx = -(p2.y-p1.y), ny = (p2.x-p1.x);
        let minA=Infinity,maxA=-Infinity;
        for(const p of polyA){ const d=p.x*nx+p.y*ny; if(d<minA)minA=d; if(d>maxA)maxA=d; }
        let minB=Infinity,maxB=-Infinity;
        for(const p of polyB){ const d=p.x*nx+p.y*ny; if(d<minB)minB=d; if(d>maxB)maxB=d; }
        if(maxA<minB || maxB<minA) return false;
      }
    }
    return true;
  }

  function wallToPoly(w){
    return [
      {x:w.x,y:w.y},{x:w.x+w.w,y:w.y},
      {x:w.x+w.w,y:w.y+w.h},{x:w.x,y:w.y+w.h}
    ];
  }

  function checkCollision(carPoly){
    for(const w of STAGE.walls){
      if(polygonsIntersect(carPoly, wallToPoly(w))) return true;
    }
    return false;
  }

  function checkGoal(){
    const g=STAGE.goal;
    if(!pointInRect(car.x,car.y,g)) return false;
    // ゴール領域内で、車体がレーンに対しほぼ平行(まっすぐ出られた)かを確認。
    // バック(R)のまま出てきても、切り返して前進(D)で出てきても、
    // どちらの向きでもまっすぐであればクリアとする。
    let headingDeg = (car.heading*180/Math.PI);
    let diffAsIs = Math.abs(angleDiff(headingDeg, STAGE.goalHeadingTargetDeg));
    let diffFlipped = Math.abs(angleDiff(headingDeg, STAGE.goalHeadingTargetDeg + 180));
    return Math.min(diffAsIs, diffFlipped) < 28;
  }

  function update(dt){
    if(!car) return;
    updateSteeringInput(dt);
    if(activityMode==="lesson") lessonSteerPeak=Math.max(lessonSteerPeak,smoothedSteerDeg);

    const steerTargetRad = (smoothedSteerDeg/CONFIG.steerInputMaxDeg) * (CONFIG.maxSteerDeg*Math.PI/180);
    car.steerAngle = steerTargetRad;

    if(gameState === "playing"){
      const accelOn = (pointerAccelCount>0) || keyAccel;
      const brakeOn = keyBrakeBtn || keyBrake;

      const dir = car.gear; // 1=forward target positive speed, -1=reverse target negative
      const maxSpd = dir>0 ? CONFIG.maxSpeedFwd : CONFIG.maxSpeedRev;

      if(brakeOn){
        const sign = car.speed>0?1:(car.speed<0?-1:0);
        car.speed -= sign*CONFIG.brakeDecel*dt;
        if(Math.sign(car.speed)!==sign) car.speed=0;
      } else if(accelOn){
        car.speed += dir*CONFIG.accel*dt;
        if(dir>0) car.speed = Math.min(car.speed, maxSpd);
        else car.speed = Math.max(car.speed, -maxSpd);
      } else {
        const sign = car.speed>0?1:(car.speed<0?-1:0);
        car.speed -= sign*CONFIG.coastDecel*dt;
        if(Math.sign(car.speed)!==sign) car.speed=0;
      }

      // Kinematic bicycle model
      const prevX=car.x, prevY=car.y, prevH=car.heading;
      const L = CONFIG.wheelBase;
      car.x += car.speed*Math.sin(car.heading)*dt;
      car.y += -car.speed*Math.cos(car.heading)*dt; // heading=0で前方=画面上方向(ワールドyの負方向)
      car.heading += (car.speed/L)*Math.tan(car.steerAngle)*dt;

      const poly = rectCorners(car.x,car.y,CONFIG.carWidth,CONFIG.carLength,car.heading);
      if(activityMode==="challenge" && checkCollision(poly)){
        car.x=prevX; car.y=prevY; car.heading=prevH; car.speed=0;
        gameState="crashed";
        flashToast("接触しました", "bad", 99999);
        document.getElementById("retryBtn").classList.add("show");
      }else if(activityMode==="challenge" && checkGoal()){
        gameState="cleared";
        flashToast("出庫成功！", "good", 99999);
        document.getElementById("retryBtn").classList.add("show");
      }else if(activityMode==="lesson" && checkLessonGoal()){
        completeLesson();
      }
    }

    if(activityMode==="lesson") updateLessonPanel();

    // HUD更新
    document.getElementById("speedVal").textContent = Math.round(Math.abs(car.speed)*3.6) + " km/h";
    const rotor = document.getElementById("wheelRotor");
    rotor.setAttribute("transform", `rotate(${smoothedSteerDeg*1.4} 50 50)`);
    const gearControl=document.getElementById("gearBtn");
    const gearFixed=activityMode==="lesson" && LESSONS[lessonIndex].fixedGear;
    const gearLocked=gearFixed || Math.abs(car.speed) > CONFIG.gearSwitchMaxSpeed;
    if(gearControl.classList.contains("locked")!==gearLocked){
      gearControl.classList.toggle("locked", gearLocked);
      gearControl.setAttribute("aria-disabled", String(gearLocked));
    }

    if(debugVisible){
      document.getElementById("debugPanel").innerHTML =
        `raw: ${rawAngleDeg===null?"--":rawAngleDeg.toFixed(1)}<br>`+
        `base: ${baselineAngleDeg.toFixed(1)}<br>`+
        `steer: ${smoothedSteerDeg.toFixed(1)}deg<br>`+
        `spd: ${car.speed.toFixed(2)} m/s<br>`+
        `gear: ${car.gear>0?"D":"R"}<br>`+
        `pos: ${car.x.toFixed(1)}, ${car.y.toFixed(1)}<br>`+
        `mode: ${activityMode}${activityMode==="lesson"?` ${lessonIndex+1}`:""}<br>`+
        `state: ${gameState}<br>`+
        `motion: ${useMotion}`;
    }
  }

  /* =========================================================
     RENDER
  ========================================================== */
  function worldToScreen(wx,wy){
    const cx = canvas.width/dpr/2, cy = canvas.height/dpr/2;
    // カメラは車を中心に追従
    return {
      x: cx + (wx - (car?car.x:0))*camScale,
      y: cy + (wy - (car?car.y:0))*camScale
    };
  }

  function drawWorld(){
    const w = canvas.width/dpr, h = canvas.height/dpr;
    ctx.clearRect(0,0,w,h);

    // asphalt base
    ctx.fillStyle = "#2b2e33";
    ctx.fillRect(0,0,w,h);

    // lane guide lines (vertical dashed) for sense of motion/space
    ctx.save();
    ctx.strokeStyle = "rgba(232,230,223,0.10)";
    ctx.lineWidth = 2;
    ctx.setLineDash([14,14]);
    for(let lx=-12; lx<=12; lx+=4){
      const p1=worldToScreen(lx, -40), p2=worldToScreen(lx, 40);
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    }
    ctx.restore();

    if(activityMode==="lesson"){
      drawLessonScene();
    }else{
      // parking slot boundary lines (white)
      ctx.strokeStyle = "#e8e6df";
      ctx.lineWidth = 3;
      const slot = { x:-1.6, y:-1.2, w:3.2, h:6.8 };
      drawWorldRectStroke(slot);

      // walls (隣接車両ブロック)
      for(const wdef of STAGE.walls){
        drawWorldRect(wdef, "#15171a", "#3a3d42");
      }

      drawGoalZone();
    }

    // car
    drawCar();
  }

  function drawWorldRect(rectDef, fill, stroke){
    const corners = [
      {x:rectDef.x,y:rectDef.y},{x:rectDef.x+rectDef.w,y:rectDef.y},
      {x:rectDef.x+rectDef.w,y:rectDef.y+rectDef.h},{x:rectDef.x,y:rectDef.y+rectDef.h}
    ].map(p=>worldToScreen(p.x,p.y));
    ctx.beginPath();
    ctx.moveTo(corners[0].x,corners[0].y);
    for(let i=1;i<corners.length;i++) ctx.lineTo(corners[i].x,corners[i].y);
    ctx.closePath();
    if(fill){ ctx.fillStyle=fill; ctx.fill(); }
    if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.stroke(); }
  }
  function drawWorldRectStroke(rectDef){
    drawWorldRect(rectDef, null, "#e8e6df");
  }

  function drawLessonScene(){
    const lesson=LESSONS[lessonIndex];
    const start=worldToScreen(lesson.startPos.x,lesson.startPos.y);
    const end=worldToScreen(lesson.goal.x+lesson.goal.w/2,lesson.goal.y+lesson.goal.h/2);
    ctx.save();
    ctx.strokeStyle="rgba(232,163,61,0.72)";
    ctx.lineWidth=3;
    ctx.setLineDash([7,7]);
    ctx.beginPath();
    ctx.moveTo(start.x,start.y);
    if(lesson.id==="stop") ctx.lineTo(end.x,end.y);
    else ctx.quadraticCurveTo(start.x,end.y,end.x,end.y);
    ctx.stroke();
    ctx.restore();

    const complete=gameState==="lessonComplete";
    drawWorldRect(lesson.goal,complete?"rgba(79,157,110,0.35)":"rgba(232,163,61,0.13)",complete?"#4f9d6e":"rgba(232,163,61,0.8)");
    const center=worldToScreen(lesson.goal.x+lesson.goal.w/2,lesson.goal.y+lesson.goal.h/2);
    ctx.save();
    ctx.fillStyle=complete?"#86c29d":"#efbd6f";
    ctx.font="bold 12px sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(lesson.goalLabel,center.x,center.y);
    ctx.restore();
  }

  function drawGoalZone(){
    const g = STAGE.goal;
    ctx.save();
    const isCleared = gameState==="cleared";
    drawWorldRect(g, isCleared?"rgba(79,157,110,0.35)":"rgba(79,157,110,0.14)", "rgba(79,157,110,0.6)");
    const center = worldToScreen(g.x+g.w/2, g.y+g.h/2);
    ctx.fillStyle="#4f9d6e"; ctx.font="bold 13px sans-serif";
    ctx.textAlign="center";
    ctx.fillText("ゴール", center.x, center.y);
    ctx.restore();
  }

  function drawCar(){
    if(!car) return;
    const p = worldToScreen(car.x, car.y);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(car.heading);
    const L = CONFIG.carLength*camScale, W = CONFIG.carWidth*camScale;

    // body
    ctx.fillStyle = gameState==="crashed" ? "#c8453a" : "#3f6fae";
    roundRectPath(-W/2,-L/2,W,L,6);
    ctx.fill();
    ctx.strokeStyle="#1c1e21"; ctx.lineWidth=2; ctx.stroke();

    // windshield: ローカル座標で前方(-y側)に配置。heading=0の時、画面上方向が前方になる。
    ctx.fillStyle = "rgba(20,24,28,0.55)";
    roundRectPath(-W*0.34, -L*0.40, W*0.68, L*0.28, 4);
    ctx.fill();

    // rear window: ローカル+y側(後方)
    ctx.fillStyle = "rgba(20,24,28,0.4)";
    roundRectPath(-W*0.3, L*0.26, W*0.6, L*0.18, 3);
    ctx.fill();

    // 前後を見分ける灯火。前方(-y)は白、後方(+y)は赤。
    ctx.fillStyle="#f2d98f";
    roundRectPath(-W*0.36,-L/2+2,W*0.22,5,2); ctx.fill();
    roundRectPath( W*0.14,-L/2+2,W*0.22,5,2); ctx.fill();
    ctx.fillStyle="#d85a50";
    roundRectPath(-W*0.36,L/2-7,W*0.22,5,2); ctx.fill();
    roundRectPath( W*0.14,L/2-7,W*0.22,5,2); ctx.fill();

    // ボンネット上の矢印は常に車体前方を指す。
    ctx.fillStyle="#e8a33d";
    ctx.beginPath();
    ctx.moveTo(0,-L*0.48);
    ctx.lineTo(-W*0.12,-L*0.39);
    ctx.lineTo(W*0.12,-L*0.39);
    ctx.closePath();
    ctx.fill();

    // wheels (Ackermann-correct front wheel visual angles)
    const wheelLen = L*0.18, wheelW = W*0.12;
    const halfTrack = W*0.42;
    const axleFront = -L*0.32; // 前軸(-y側 = 前方)
    const axleRear = L*0.32;   // 後軸(+y側 = 後方)

    let innerAngle=0, outerAngle=0;
    if(Math.abs(car.steerAngle) > 0.001){
      const turnR = CONFIG.wheelBase/Math.tan(Math.abs(car.steerAngle));
      const halfTrackM = CONFIG.carWidth*0.42;
      innerAngle = Math.atan(CONFIG.wheelBase/(turnR-halfTrackM));
      outerAngle = Math.atan(CONFIG.wheelBase/(turnR+halfTrackM));
    }
    const sgn = car.steerAngle>=0?1:-1;
    const leftFrontAng  = sgn>0 ? innerAngle*sgn : outerAngle*sgn;
    const rightFrontAng = sgn>0 ? outerAngle*sgn : innerAngle*sgn;

    drawWheel(-halfTrack, axleFront, wheelW, wheelLen, leftFrontAng);
    drawWheel( halfTrack, axleFront, wheelW, wheelLen, rightFrontAng);
    drawWheel(-halfTrack, axleRear, wheelW, wheelLen, 0);
    drawWheel( halfTrack, axleRear, wheelW, wheelLen, 0);

    ctx.restore();

    // 文字は画面に対して正立させ、旋回中も前後を読み取れるようにする。
    const forwardX=Math.sin(car.heading), forwardY=-Math.cos(car.heading);
    const markerOffset=L/2+13;
    drawCarEndLabel(p.x+forwardX*markerOffset,p.y+forwardY*markerOffset,"前","#e8a33d");
    drawCarEndLabel(p.x-forwardX*markerOffset,p.y-forwardY*markerOffset,"後","#d85a50");
  }

  function drawCarEndLabel(x,y,label,color){
    ctx.save();
    roundRectPath(x-12,y-9,24,18,5);
    ctx.fillStyle="rgba(21,23,26,0.92)"; ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=color; ctx.font="bold 11px sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(label,x,y+0.5);
    ctx.restore();
  }

  function drawWheel(lx,ly,w,h,angle){
    ctx.save();
    ctx.translate(lx,ly);
    ctx.rotate(angle);
    ctx.fillStyle="#0e0f11";
    roundRectPath(-w/2,-h/2,w,h,2);
    ctx.fill();
    ctx.restore();
  }

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  /* =========================================================
     TOAST
  ========================================================== */
  let toastTimer=null;
  function flashToast(msg, type, ms){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.className="show "+(type||"");
    if(toastTimer) clearTimeout(toastTimer);
    if(ms && ms<99999){
      toastTimer=setTimeout(hideToast, ms);
    }
  }
  function hideToast(){
    document.getElementById("toast").className="";
  }

  /* =========================================================
     MAIN LOOP
  ========================================================== */
  function loop(ts){
    if(lastTime===null) lastTime=ts;
    let dt=(ts-lastTime)/1000;
    lastTime=ts;
    dt=Math.min(dt,0.05);
    update(dt);
    drawWorld();
    requestAnimationFrame(loop);
  }

  /* =========================================================
     座標系メモ
     heading=0 のとき、車の前方(フロントガラス側)は画面上方向(ワールドyの負方向)を向く(この式の構造上の定義)。
     教材と出庫ステージはheading=0で開始し、常に画面上側が車体前方になる。
     gear=1(D)なら画面上へ前進、gear=-1(R)なら画面下へ後退する。
     car.x += speed*sin(heading)*dt; car.y += -speed*cos(heading)*dt;
  ========================================================== */

  /* =========================================================
     INIT
  ========================================================== */
  function init(){
    setupCanvas();
    setupPointerInputs();
    resetCar();

    document.getElementById("startBtn").addEventListener("click", handleSetupPrimary);
    document.getElementById("keyboardBtn").addEventListener("click", startKeyboardFallback);
    setSetupState("intro");

    // デバッグ表示: 画面を3本指タップ、またはキーボード'd'で切替(開発確認用)
    window.addEventListener("keydown", (e)=>{
      if(e.key==="d"){
        debugVisible=!debugVisible;
        document.getElementById("debugPanel").classList.toggle("hidden", !debugVisible);
      }
    });

    requestAnimationFrame(loop);
  }

  async function handleSetupPrimary(){
    const action=document.getElementById("startBtn").dataset.action;
    if(action==="start"){
      enterGame();
      return;
    }
    if(action!=="request") return;

    clearCalibrationTimer();
    setSetupState("requesting");
    const hasMotionAPI = (typeof DeviceMotionEvent !== "undefined");
    if(!hasMotionAPI){
      useMotion = false;
      setSetupState("fallback", "センサー非対応です。別のスマホで開いてください。");
      return;
    }

    const granted = await requestMotionPermission();
    if(!granted){
      useMotion = false;
      setSetupState("fallback", "センサーが未許可です。ブラウザ設定を確認してください。");
      return;
    }

    attachMotionListener();
    useMotion = true;
    beginCalibration(setupResumeGame);
  }

  function startKeyboardFallback(){
    clearCalibrationTimer();
    useMotion=false;
    rawAngleDeg=null;
    setupResumeGame=false;
    enterGame();
    flashToast("キーボード操作モード", "good", 900);
  }

  function enterGame(){
    const resume=setupResumeGame;
    clearCalibrationTimer();
    smoothedSteerDeg=0;
    resetPressedInputs();
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("startScreen").setAttribute("aria-hidden","true");
    document.getElementById("hud").classList.remove("hidden");
    setupResumeGame=false;
    if(!resume && !trainingStarted) startLesson(0);
    else{
      syncGearUI();
      if(activityMode==="lesson") updateLessonPanel();
    }
  }

  init();
})();
</script>
</body>
</html>
